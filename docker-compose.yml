services:
  # Zookeeper - Required for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: vms-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - vms-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: vms-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - vms-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka UI - Web interface for Kafka management
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vms-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vms-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - vms-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka Init - Create topics on startup
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: vms-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - vms-network
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 10
      
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:9094 --create --if-not-exists --topic ais-raw-data --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9094 --create --if-not-exists --topic weather-data --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9094 --create --if-not-exists --topic port-data --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9094 --create --if-not-exists --topic vessel-positions --partitions 12 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9094 --create --if-not-exists --topic vessel-alerts --partitions 6 --replication-factor 1
      
      echo 'Kafka topics created successfully!'
      kafka-topics --bootstrap-server kafka:9094 --list
      "

  # PostgreSQL with PostGIS - Primary database for current state
  postgres:
    image: postgis/postgis:16-3.4
    container_name: vms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vessel_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c effective_cache_size=1GB

  # ClickHouse - Time-series analytics database
  clickhouse:
    image: clickhouse/clickhouse-server:23.12
    container_name: vms-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native TCP interface
    environment:
      CLICKHOUSE_DB: vessel_monitoring
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vms-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ClickHouse Init - Initialize database and tables
  clickhouse-init:
    image: clickhouse/clickhouse-server:23.12
    container_name: vms-clickhouse-init
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - vms-network
    volumes:
      - ./scripts/init-clickhouse.sql:/init-clickhouse.sql
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for ClickHouse to be ready...'
      sleep 5
      
      echo 'Initializing ClickHouse database and tables...'
      clickhouse-client --host clickhouse --multiquery < /init-clickhouse.sql
      
      echo 'ClickHouse initialization completed!'
      clickhouse-client --host clickhouse --query 'SHOW DATABASES'
      clickhouse-client --host clickhouse --query 'SHOW TABLES FROM vessel_monitoring'
      "

  # Redis - Real-time cache with TTL
  redis:
    image: redis:7.2-alpine
    container_name: vms-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - vms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch - Search and log analytics
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: vms-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=vms-cluster
      - node.name=vms-node-1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - vms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # Kibana - Elasticsearch UI (Optional)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: vms-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=vms-kibana
    networks:
      - vms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  postgres-data:
    driver: local
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local

networks:
  vms-network:
    driver: bridge
